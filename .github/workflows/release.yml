name: Build and Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v20240127.0). Leave empty to auto-generate.'
        required: false
        type: string
      draft:
        description: 'Create the release as a draft prerelease (instead of publishing)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  GO_VERSION: '1.24'

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flynn environment
        run: |
          echo "FLYNN_ROOT=${{ github.workspace }}" >> $GITHUB_ENV
          echo "FLYNN_DISCOVERY_DIR=${{ github.workspace }}/flynn-discovery" >> $GITHUB_ENV
          # Allow git operations as root (build.sh runs under sudo) on the workspace
          git config --global --add safe.directory "${{ github.workspace }}"
          sudo git config --system --add safe.directory "${{ github.workspace }}"

      - name: Determine release mode
        id: mode
        run: |
          set -eo pipefail
          DRAFT=false
          PRERELEASE=false
          BRANCH_SUFFIX=""

          case "${{ github.event_name }}" in
            pull_request)
              DRAFT=true
              PRERELEASE=true
              # Sanitize branch name for use in a version tag suffix
              BRANCH_SUFFIX=$(echo "${{ github.head_ref }}" | tr '/' '-' | tr -cd '[:alnum:]-')
              ;;
            workflow_dispatch)
              if [[ "${{ inputs.draft }}" == "true" ]]; then
                DRAFT=true
                PRERELEASE=true
              fi
              ;;
          esac

          echo "DRAFT=${DRAFT}" >> $GITHUB_OUTPUT
          echo "PRERELEASE=${PRERELEASE}" >> $GITHUB_OUTPUT
          echo "BRANCH_SUFFIX=${BRANCH_SUFFIX}" >> $GITHUB_OUTPUT
          echo "Release mode: draft=${DRAFT} prerelease=${PRERELEASE} branch_suffix='${BRANCH_SUFFIX}'"

      - name: Determine version
        id: version
        run: |
          set -eo pipefail
          git fetch --tags --force

          VERSION="${{ inputs.version }}"
          if [[ -z "${VERSION}" ]]; then
            DATE_PREFIX="v$(date +%Y%m%d)"
            # Only consider numeric iterations (ignore branch-suffixed tags from PR builds)
            LATEST_TODAY=$(git tag -l "${DATE_PREFIX}.*" | grep -E "^${DATE_PREFIX}\.[0-9]+$" | sort -V | tail -n1 || true)
            if [[ -n "${LATEST_TODAY}" ]]; then
              ITERATION="${LATEST_TODAY##*.}"
              VERSION="${DATE_PREFIX}.$((ITERATION + 1))"
            else
              VERSION="${DATE_PREFIX}.0"
            fi
          fi

          BRANCH_SUFFIX="${{ steps.mode.outputs.BRANCH_SUFFIX }}"
          if [[ -n "${BRANCH_SUFFIX}" ]]; then
            # For PR builds, always use .0 with branch suffix so re-pushes reuse the same draft
            VERSION="v$(date +%Y%m%d).0-${BRANCH_SUFFIX}"
          fi

          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # Docker is pre-installed on GitHub Actions runners
          sudo apt-get install -y \
            build-essential \
            debootstrap \
            squashfs-tools \
            zfsutils-linux \
            jq \
            curl \
            git \
            gh \
            iptables \
            iproute2 \
            net-tools \
            bridge-utils \
            libdevmapper-dev \
            libseccomp-dev \
            pigz
          docker --version

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up ZFS pool
        run: |
          sudo truncate -s 20G /zfs-pool.img
          sudo zpool create -f flynn-default /zfs-pool.img
          sudo zfs set compression=lz4 flynn-default
          sudo zfs set sync=disabled flynn-default
          # Cap ZFS ARC to 2 GiB so it doesn't compete with parallel `go build`
          # processes for the runner's 16 GiB of RAM. Default ARC max is ~half
          # of system RAM, which on GH Actions runners leaves the build
          # containers short on memory and triggers ENOMEM during compilation.
          echo 2147483648 | sudo tee /sys/module/zfs/parameters/zfs_arc_max

      - name: Add swap (GH Actions runners ship with none)
        run: |
          # 8 GiB swapfile on /mnt (GH-hosted runners' large ephemeral disk).
          # Acts as a safety net for transient memory spikes during the
          # flynn-builder fan-out; FLYNN_BUILD_CONCURRENCY=1 keeps peak usage
          # bounded, but swap absorbs any remaining headroom shortfall.
          sudo fallocate -l 8G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      - name: Set up Flynn directory structure
        run: |
          sudo mkdir -p /var/lib/flynn /var/log/flynn /etc/flynn /tmp/discoverd-data /var/run/flynn-local

      - name: Build sha512_256_binary tool
        run: |
          cd ${{ env.FLYNN_ROOT }}
          if [ -f sha512_256.go ]; then
            go build -o sha512_256_binary sha512_256.go
          elif [ -f sha512_256_binary.go ]; then
            go build -o sha512_256_binary sha512_256_binary.go
          fi

      - name: Start flynn-discovery
        if: hashFiles('flynn-discovery/docker-compose.yml', 'flynn-discovery/docker-compose.yaml') != ''
        run: |
          cd ${{ env.FLYNN_DISCOVERY_DIR }}
          docker compose up -d --build
          echo "Waiting for discovery service..."
          sleep 10

      - name: Run build.sh
        env:
          # Skip teardown_flynn (which would destroy the zpool we just created
          # and try to systemctl-stop a non-existent flynn-host service).
          FLYNN_BUILD_SKIP_TEARDOWN: "1"
          # Serialize flynn-builder image builds on this runner. The default
          # (NumCPU) fans out ~10 concurrent `go build` jobs and exhausts the
          # runner's 16 GiB of RAM, surfacing as `readdirent: cannot allocate
          # memory` mid-compile. Unset on Vagrant/production.
          FLYNN_BUILD_CONCURRENCY: "1"
        run: |
          cd ${{ env.FLYNN_ROOT }}
          sudo -E ./build.sh --version "${{ steps.version.outputs.VERSION }}"

      - name: Create GitHub Release (via script/release)
        env:
          # gh CLI picks up GH_TOKEN automatically. sudo -E preserves it.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FLYNN_GITHUB_REPO: ${{ github.repository }}
        run: |
          cd ${{ env.FLYNN_ROOT }}
          ARGS=(--target github
                --version "${{ steps.version.outputs.VERSION }}"
                --github-repo "${{ github.repository }}")
          if [[ "${{ steps.mode.outputs.DRAFT }}" == "true" ]]; then
            ARGS+=(--draft)
          fi
          if [[ "${{ steps.mode.outputs.PRERELEASE }}" == "true" ]]; then
            ARGS+=(--prerelease)
          fi
          sudo -E ./script/release "${ARGS[@]}"

      - name: Cleanup
        if: always()
        run: |
          cd ${{ env.FLYNN_ROOT }}
          sudo ./script/stop-all || true
          if [ -d "${{ env.FLYNN_DISCOVERY_DIR }}" ]; then
            cd ${{ env.FLYNN_DISCOVERY_DIR }}
            docker compose down || true
          fi
          sudo zpool destroy flynn-default || true